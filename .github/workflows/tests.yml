name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: UCSC-Transients/dark-hunter_rv
          path: dark-hunter_rv
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e dark-hunter_rv
          pip install -e ".[dev,plot]"
      - name: Run tests
        env:
          PYTHONPATH: dark-hunter_rv:.
        run: pytest -q
